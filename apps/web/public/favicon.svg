<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="alien-grad" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdba74" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>

    <filter id="alien-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="#09090b" />
  <rect width="512" height="512" rx="112" stroke="rgba(255,255,255,0.08)" stroke-width="8" />

  <!-- Alien Base Group with Drop Shadow -->
  <g filter="url(#alien-shadow)">
    <!-- Main Orange Alien Shape -->
    <path d="M 116 46 H 396 V 126 H 472 V 346 H 452 V 466 H 388 V 346 H 344 V 466 H 280 V 346 H 232 V 466 H 168 V 346 H 124 V 466 H 60 V 346 H 40 V 126 H 116 Z"
          fill="url(#alien-grad)" stroke="url(#alien-grad)" stroke-width="24" stroke-linejoin="round" opacity="0.9" />

    <!-- Inner Brightness / Glass Edge -->
    <path d="M 116 46 H 396 V 126 H 472 V 346 H 452 V 466 H 388 V 346 H 344 V 466 H 280 V 346 H 232 V 466 H 168 V 346 H 124 V 466 H 60 V 346 H 40 V 126 H 116 Z"
          fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="4" stroke-linejoin="round" />
  </g>

  <!-- Logo Text -->
  <text x="256" y="106" fill="#78350f" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="18" letter-spacing="6" text-anchor="middle" dominant-baseline="middle">VIBE</text>

  <!-- Eye 1 -->
  <rect x="160" y="58" width="36" height="36" rx="8" fill="#09090b" />
  <rect x="160" y="58" width="36" height="28" rx="8" fill="#18181b" stroke="#52525b" stroke-width="1.5" />

  <!-- Eye 2 -->
  <rect x="316" y="58" width="36" height="36" rx="8" fill="#09090b" />
  <rect x="316" y="58" width="36" height="28" rx="8" fill="#18181b" stroke="#52525b" stroke-width="1.5" />

  <!-- Left Arm Key -->
  <rect x="50" y="146" width="56" height="76" rx="12" fill="#09090b" />
  <rect x="50" y="146" width="56" height="66" rx="12" fill="#18181b" stroke="#52525b" stroke-width="1.5" />

  <!-- Right Arm Key -->
  <rect x="406" y="146" width="56" height="76" rx="12" fill="#09090b" />
  <rect x="406" y="146" width="56" height="66" rx="12" fill="#18181b" stroke="#52525b" stroke-width="1.5" />

  <!-- Row 1: Up Arrow -->
  <rect x="218" y="126" width="76" height="76" rx="12" fill="#09090b" />
  <rect x="218" y="126" width="76" height="66" rx="12" fill="#18181b" stroke="#52525b" stroke-width="1.5" />
  <path d="M256 149 L256 169 M248 157 L256 149 L264 157" stroke="#f4f4f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Row 2: Left, Down, Right -->
  <rect x="126" y="218" width="76" height="76" rx="12" fill="#09090b" />
  <rect x="126" y="218" width="76" height="66" rx="12" fill="#18181b" stroke="#52525b" stroke-width="1.5" />
  <path d="M174 251 L154 251 M162 243 L154 251 L162 259" stroke="#f4f4f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <rect x="218" y="218" width="76" height="76" rx="12" fill="#09090b" />
  <rect x="218" y="218" width="76" height="66" rx="12" fill="#18181b" stroke="#52525b" stroke-width="1.5" />
  <path d="M256 241 L256 261 M248 253 L256 261 L264 253" stroke="#f4f4f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <rect x="310" y="218" width="76" height="76" rx="12" fill="#09090b" />
  <rect x="310" y="218" width="76" height="66" rx="12" fill="#18181b" stroke="#52525b" stroke-width="1.5" />
  <path d="M338 251 L358 251 M350 243 L358 251 L350 259" stroke="#f4f4f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Row 3: ESC, ENTER, MIC -->
  <rect x="56" y="310" width="84" height="76" rx="12" fill="#09090b" />
  <rect x="56" y="310" width="84" height="66" rx="12" fill="#18181b" stroke="#52525b" stroke-width="1.5" />
  <text x="98" y="345" fill="#f4f4f5" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" letter-spacing="1" text-anchor="middle" dominant-baseline="middle">ESC</text>

  <rect x="156" y="310" width="200" height="76" rx="12" fill="#09090b" />
  <rect x="156" y="310" width="200" height="66" rx="12" fill="#18181b" stroke="#52525b" stroke-width="1.5" />
  <text x="256" y="345" fill="#f4f4f5" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="18" letter-spacing="2" text-anchor="middle" dominant-baseline="middle">ENTER</text>

  <rect x="372" y="310" width="84" height="76" rx="12" fill="#09090b" />
  <rect x="372" y="310" width="84" height="66" rx="12" fill="#18181b" stroke="#52525b" stroke-width="1.5" />
  <g stroke="#f4f4f5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <rect x="408" y="328" width="12" height="16" rx="6" />
    <path d="M402 340 v 2 a 12 12 0 0 0 24 0 v -2" />
    <path d="M414 354 v 6" />
    <path d="M406 360 h 16" />
  </g>

</svg>

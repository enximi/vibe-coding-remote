<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="#09090b" />
  <!-- Subtle Glass Edge -->
  <rect width="512" height="512" rx="112" stroke="rgba(255,255,255,0.08)" stroke-width="8" />

  <defs>
    <!-- Vibrant Voice Gradient (Cyan to Indigo to Pink) -->
    <linearGradient id="wave" x1="92" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>

    <!-- Deep Glow Blur Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing Aura Layer -->
  <g filter="url(#glow)" opacity="0.65">
    <rect x="92" y="280" width="40" height="80" rx="20" fill="url(#wave)" />
    <rect x="164" y="210" width="40" height="150" rx="20" fill="url(#wave)" />
    <rect x="236" y="140" width="40" height="220" rx="20" fill="url(#wave)" />
    <rect x="308" y="210" width="40" height="150" rx="20" fill="url(#wave)" />
    <rect x="380" y="280" width="40" height="80" rx="20" fill="url(#wave)" />
    <line x1="64" y1="392" x2="448" y2="392" stroke="url(#wave)" stroke-width="12" stroke-linecap="round" />
  </g>

  <!-- Sharp Crisp Foreground Audio Bars (The EQ Arch) -->
  <g>
    <rect x="92" y="280" width="40" height="80" rx="20" fill="url(#wave)" />
    <rect x="164" y="210" width="40" height="150" rx="20" fill="url(#wave)" />
    <rect x="236" y="140" width="40" height="220" rx="20" fill="url(#wave)" />
    <rect x="308" y="210" width="40" height="150" rx="20" fill="url(#wave)" />
    <rect x="380" y="280" width="40" height="80" rx="20" fill="url(#wave)" />
  </g>

  <!-- The Bridge Base Platform Connectors -->
  <line x1="64" y1="392" x2="448" y2="392" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.9" />
  <circle cx="64" cy="392" r="14" fill="#ffffff" />
  <circle cx="448" cy="392" r="14" fill="#ffffff" />
</svg>

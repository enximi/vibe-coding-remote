<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <title>声桥</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <form id="composerForm" novalidate>
    <input
      id="composerInput"
      name="text"
      type="text"
      inputmode="text"
      autocomplete="off"
      autocorrect="on"
      autocapitalize="sentences"
      spellcheck="false"
      enterkeyhint="send"
      aria-label="输入要发送到电脑的文字"
    >
    <button class="submit-proxy" type="submit" aria-hidden="true" tabindex="-1">发送</button>
  </form>
  <nav class="action-bar" aria-label="快捷操作">
    <button class="action-button action-button--send" type="submit" form="composerForm">发送</button>
    <button class="action-button" type="button" data-key="enter">回车</button>
    <button class="action-button" type="button" data-key="tab">Tab</button>
    <button class="action-button" type="button" data-key="backspace">退格</button>
  </nav>

  <script src="./app.js" defer></script>
</body>
</html>
